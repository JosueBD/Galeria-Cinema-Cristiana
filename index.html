<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria Cinema Cristiana</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Galeria Cinema Cristiana</h1>
    <section class="gallery-container">
        <div class="video-item">
            <video autoplay muted loop class="video-thumbnail">
                <source src="sources/uno.mp4" type="video/mp4">
            </video>
        </div>

        <div class="video-item">
            <video autoplay muted loop class="video-thumbnail">
                <source src="sources/dos.mp4" type="video/mp4">
            </video>
        </div>

        <div class="video-item">
            <video autoplay muted loop class="video-thumbnail">
                <source src="sources/tres.mp4" type="video/mp4">
            </video>
        </div>

        <div class="video-item">
            <video autoplay muted loop class="video-thumbnail">
                <source src="sources/cuatro.mp4" type="video/mp4">
            </video>
        </div>

    </section>

    <button class="control-btn" onclick="location.reload()">Reiniciar Cinema Cristiana</button>
    
</body>
</html>
